services:
  - type: web
    name: codeva-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codeva-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "0"

databases:
  - name: codeva-db
    plan: free
