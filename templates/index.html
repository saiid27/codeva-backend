<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>تسجيل الدخول - CODEVA Presence</title>
    <link rel="icon" href="{{ url_for('static', filename='web/favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='web/styles.css') }}">
  </head>
  <body>
    <main class="login-page">
      <section class="login-header">
        <span class="brand-mark">CODEVA</span>
        <h1>تسجيل الدخول</h1>
        <p>نظام حضور العمال عبر QR و GPS</p>
      </section>

      <form class="login-card" action="/auth/login" method="post">
        <label for="email">البريد الإلكتروني</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="admin@gmail.com" required>

        <label for="password">كلمة المرور</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>

        <button type="submit">دخول</button>

        <p class="helper">
          المدير هو من يضيف حسابات العمال داخل النظام.
        </p>
      </form>

      <nav class="footer-links" aria-label="روابط مساعدة">
        <a href="/about">من نحن</a>
        <a href="/contact">تواصل معنا</a>
        <a href="/privacy">الخصوصية</a>
      </nav>
    </main>
  </body>
</html>
