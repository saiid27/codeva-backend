<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dev Login - CODEVA Presence</title>
    <link rel="icon" href="{{ url_for('static', filename='web/favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='web/styles.css') }}">
  </head>
  <body>
    <main class="login-page">
      <section class="login-header">
        <span class="brand-mark">CODEVA Presence</span>
        <h1>دخول المطور</h1>
        <p>إدارة حسابات مدراء الشركات</p>
      </section>

      <form class="login-card" action="/dev/login" method="post">
        <label for="email">البريد الإلكتروني</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="codeva@gmail.com" required>

        <label for="password">كلمة المرور</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>

        <button type="submit">دخول</button>

        {% if error %}
          <p class="form-error">{{ error }}</p>
        {% endif %}
      </form>
    </main>
  </body>
</html>
