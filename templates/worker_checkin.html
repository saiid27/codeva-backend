<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>تسجيل الحضور - CODEVA Presence</title>
    <link rel="icon" href="{{ url_for('static', filename='web/favicon.svg') }}">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='web/icon-192.png') ~ '?v=20260610-qr-direct' }}">
    <meta name="theme-color" content="#2f6e5a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CODEVA Presence">
    <link rel="stylesheet" href="{{ url_for('static', filename='web/styles.css') ~ '?v=20260610-qr-direct' }}">
    <script src="{{ url_for('static', filename='web/pwa.js') ~ '?v=20260610-qr-direct' }}" defer></script>
  </head>
  <body class="dev-body">
    <main class="dev-page worker-page">
      <header class="dev-header">
        <div>
          <span class="brand-mark">CODEVA Presence</span>
          <h1>تسجيل الحضور</h1>
          <p>{{ worker_name or worker_email }}</p>
        </div>
        <a class="dev-link" href="/worker">رجوع</a>
      </header>

      <section class="worker-hero checkin-panel">
        <h2>تسجيل الحضور</h2>
        <p id="checkinStatus" class="{{ status_type }}">{{ status_message }}</p>
        <a class="worker-action primary single-action" href="{{ request.full_path }}">
          <span class="tile-icon">✓</span>
          <span>
            <strong>إعادة المحاولة</strong>
            <small>يفتح نفس رابط QR ويسجل الحضور مباشرة</small>
          </span>
        </a>
      </section>
    </main>
  </body>
</html>
